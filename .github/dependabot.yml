# Dependabot — weekly dependency + GitHub Actions update PRs. Keeps the (optional) SDKs, dev tooling, and CI
# actions patched without manual tracking. Security updates are raised immediately regardless of schedule.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # MAJOR bumps need a deliberate upgrade — don't auto-raise them. Security advisories still raise a fix PR.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
