name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with provider SDKs + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai,anthropic,otel,chat,dev]"
      - name: Lint (ruff — pyflakes + bugbear correctness rules)
        run: ruff check src tests
      - name: Pricing self-check
        run: spendguard pricing
      - name: Price freshness (warns if stale; non-fatal here)
        run: spendguard check-prices || true
      - name: Test suite + coverage (offline — ENFORCED by the runner's dead proxy + stripped keys)
        run: |
          # -n auto: every test file is an isolated subprocess with its own temp home, so they are
          # embarrassingly parallel (one live-billing hog once made the serial suite read as 24 min).
          SPENDGUARD_COVERAGE=1 pytest -n auto
          coverage combine
          # Two floors: a whole-package regression floor, and a HIGH bar on the money-critical core (the gate,
          # ledger, reconcile, pricing, attribution). The package number is dragged by I/O-adapter modules
          # (chat→claude.ai, saas push, transcript parsers, paid-call tools) that are integration- not unit-tested
          # by design; the core is where correctness must be proven. Today: package ~42%, core ~81%.
          coverage report --fail-under=40
          coverage report --fail-under=78 --include="*/gate.py,*/guard.py,*/budget.py,*/reconcile.py,*/ledger_sync.py,*/pricing.py,*/attribution.py,*/adapters.py,*/tag.py,*/backfill.py,*/deid.py,*/litellm_adapter.py,*/bedrock_adapter.py"
      - name: Price-literal audit (FAILS the build on a mispriced literal)
        run: SPENDGUARD_AUDIT_DIR=src/spendguard spendguard audit --ci
