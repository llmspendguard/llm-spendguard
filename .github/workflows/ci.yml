name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with provider SDKs for the gate tests)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai,anthropic]"
      - name: Pricing self-check
        run: spendguard pricing
      - name: Price freshness (warns if stale; non-fatal here)
        run: spendguard check-prices || true
      - name: Gate regression (offline — no network, no spend)
        run: python tests/test_gate.py
      - name: Price-literal audit
        run: SPENDGUARD_AUDIT_DIR=src/spendguard python -c "import sys; from spendguard.audit import main; sys.exit(main(['--ci']) or 0)" || true
