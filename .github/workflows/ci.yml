name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with provider SDKs + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[openai,anthropic,dev]"
      - name: Lint (ruff — pyflakes + bugbear correctness rules)
        run: ruff check src tests
      - name: Pricing self-check
        run: spendguard pricing
      - name: Price freshness (warns if stale; non-fatal here)
        run: spendguard check-prices || true
      - name: Test suite + coverage (offline — no network, no spend)
        run: |
          SPENDGUARD_COVERAGE=1 pytest
          coverage combine
          coverage report --fail-under=15   # regression floor; ~19% today (core exercised; CLI/mining gaps tracked)
      - name: Price-literal audit (FAILS the build on a mispriced literal)
        run: SPENDGUARD_AUDIT_DIR=src/spendguard spendguard audit --ci
