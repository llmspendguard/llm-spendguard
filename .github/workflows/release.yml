name: release
# Publish to PyPI on a version tag (v*). Uses PyPI Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a Trusted Publisher for project `llm-spendguard` →
#   owner: llmspendguard · repo: llm-spendguard · workflow: release.yml · environment: pypi
# Then: bump version in pyproject.toml + __init__.py, tag `vX.Y.Z`, push the tag.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check the dist
        run: |
          pip install twine
          twine check dist/*
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # extract the matching "## [X.Y.Z]" section from the changelog as the release notes
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $GITHUB_REF_NAME" > notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md dist/*
