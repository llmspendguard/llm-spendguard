name: release
# Publish to PyPI on a version tag (v*). Uses PyPI Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a Trusted Publisher for project `llm-spendguard` →
#   owner: llmspendguard · repo: llm-spendguard · workflow: release.yml · environment: pypi
# Then: bump version in pyproject.toml + __init__.py, tag `vX.Y.Z`, push the tag.
on:
  push:
    tags: ['v*']

jobs:
  test:                          # GATE — a version tag must NOT publish an unverified build (forensic tool: no red build ships)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install (same extras as CI)
        run: python -m pip install -e ".[openai,anthropic,dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test suite (offline, no spend)
        run: pytest
      - name: Price-literal audit
        run: SPENDGUARD_AUDIT_DIR=src/spendguard spendguard audit --ci

  publish:
    needs: test                  # publish ONLY after the tagged commit passes lint + tests + audit
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check the dist
        run: |
          pip install twine
          twine check dist/*
      - name: Publish to PyPI (trusted publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 — 3rd-party action pinned to SHA
        with:
          attestations: true       # Sigstore-backed PEP 740 provenance on PyPI (uses the OIDC id-token above)
      - name: SBOM (CycloneDX) — full dependency surface incl. [all] extras
        run: |
          python -m pip install ".[all]" cyclonedx-bom
          cyclonedx-py environment -o sbom.cdx.json
          python - <<'PY'
          import json; d=json.load(open("sbom.cdx.json"))
          print("SBOM components:", len(d.get("components", [])))
          PY
      - name: Sign artifacts (Sigstore — keyless, GitHub OIDC identity)
        run: |
          python -m pip install sigstore
          python -m sigstore sign dist/*.tar.gz dist/*.whl   # → dist/*.sigstore.json transparency-log bundles
      - name: GitHub Release from CHANGELOG (+ SBOM + signatures)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          # extract the matching "## [X.Y.Z]" section from the changelog as the release notes
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > notes.md
          [ -s notes.md ] || echo "Release $GITHUB_REF_NAME" > notes.md
          {
            echo ""
            echo "---"
            echo "**Supply chain:** PyPI upload carries PEP 740 attestations (Sigstore). Release assets include a"
            echo "CycloneDX SBOM (\`sbom.cdx.json\`) and Sigstore bundles (\`*.sigstore.json\`) — verify with:"
            echo '```'
            echo "python -m sigstore verify identity dist/llm_spendguard-$VER*.whl \\"
            echo "  --cert-identity https://github.com/llmspendguard/llm-spendguard/.github/workflows/release.yml@refs/tags/$GITHUB_REF_NAME \\"
            echo "  --cert-oidc-issuer https://token.actions.githubusercontent.com"
            echo '```'
          } >> notes.md
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file notes.md \
            dist/*.tar.gz dist/*.whl dist/*.sigstore.json sbom.cdx.json
