name: release
# Publish to PyPI on a version tag (v*). Uses PyPI Trusted Publishing (OIDC) — no API token stored.
# One-time setup on PyPI: add a Trusted Publisher for project `llm-spendguard` →
#   owner: llmspendguard · repo: llm-spendguard · workflow: release.yml · environment: pypi
# Then: bump version in pyproject.toml + __init__.py, tag `vX.Y.Z`, push the tag.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # OIDC token for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check the dist
        run: |
          pip install twine
          twine check dist/*
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
