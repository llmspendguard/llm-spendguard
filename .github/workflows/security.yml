name: security
on:
  push: { branches: [main] }
  pull_request:
  schedule:
    - cron: "0 7 * * 1"   # weekly deep pass (Mon 07:00 UTC)

# Automated security baseline for the public client: SAST (CodeQL), secret scanning (TruffleHog, verified-only), and
# a dependency audit. CodeQL uploads to GitHub code scanning (free on public repos). TruffleHog fails ONLY on a
# *verified* (live) secret — test fixtures + placeholder keys can't verify, so there are no false positives and no
# allowlist to maintain. The dependency audit is report-only — Dependabot raises the actual fix PRs — so a newly-
# disclosed CVE never blocks an unrelated change.
permissions:
  contents: read
  security-events: write   # CodeQL SARIF upload

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with: { languages: python }
      - uses: github/codeql-action/analyze@v4

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # whole tree + history
      # The official TruffleHog action, pinned to a SHA (no `curl | sh` — the action vendors the integrity-checked
      # binary). --only-verified confirms a candidate is a LIVE key before failing, so fake/example keys never trip it;
      # path: ./ = a filesystem scan of the whole tree (matches the prior `trufflehog filesystem .`).
      # base:"" + head:HEAD force a FULL history+tree scan; without them the action's default base resolves to HEAD,
      # so base==head → it errors "BASE and HEAD commits are the same" and exits 1 WITHOUT scanning (red, but never
      # actually scanning). The action also appends --fail itself, so don't repeat it in extra_args.
      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70  # v3.95.6 — 3rd-party action, SHA-pinned
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: pip-audit (report-only; Dependabot raises fix PRs)
        run: |
          pip install pip-audit
          pip install -e ".[openai,anthropic,dev]"
          pip-audit || echo "::warning::pip-audit found advisories — see Dependabot for fix PRs"
